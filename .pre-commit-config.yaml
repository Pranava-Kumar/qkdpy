repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: requirements-txt-fixer

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort --profile black
        language: system
        types: [python]
        # scripts/blackbox/test_utils_api.py is a 1700-line blackbox
        # diagnostic that places imports inside print / try blocks;
        # isort+black disagree on the long-wrap and end up oscillating.
        # Skip lint auto-format on it; ruff still checks it via the
        # per-file-ignores in pyproject.toml.
        exclude: ^scripts/blackbox/test_utils_api\.py$

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]
        exclude: ^scripts/blackbox/test_utils_api\.py$
