# CodeQL analysis for QKDpy
#
# Runs CodeQL's default suite of security queries for Python on every
# push to main and every pull request. Also runs on a weekly schedule
# to catch issues in dependencies that may have been disclosed recently.
#
# Docs: https://docs.github.com/en/code-security/code-scanning

name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Default mode — uses the standard query suite.
          # No custom queries or configuration file needed for this
          # project. If per-query tuning becomes necessary later,
          # graduate to Advanced mode by adding:
          #   config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
