name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Format check (black)
        run: uv run black --check --diff src/ tests/ benchmarks/ 2>&1 || (echo "Black found formatting issues above" && false)

      - name: Lint check (ruff)
        run: uv run ruff check src/ tests/ 2>&1 || (echo "Ruff found lint issues above" && false)

      - name: Formatting helpers check (pre-commit hooks)
        run: |
          uv run pre-commit run trailing-whitespace --all-files 2>&1
          uv run pre-commit run end-of-file-fixer --all-files 2>&1
          uv run pre-commit run check-yaml --all-files 2>&1
          uv run pre-commit run check-toml --all-files 2>&1
          uv run pre-commit run check-json --all-files 2>&1
          uv run pre-commit run check-merge-conflict --all-files 2>&1
          uv run pre-commit run debug-statements --all-files 2>&1
          uv run pre-commit run requirements-txt-fixer --all-files 2>&1

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.11"
      # Continue on partial failures so all matrix results report
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/qkdpy --cov-report=xml --cov-report=term -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: ${{ matrix.os }},py${{ matrix.python-version }}
          fail_ci_if_error: false

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run mypy
        run: uv run mypy src/qkdpy

  benchmark:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run benchmarks
        run: uv run pytest tests/benchmark_cv_qkd.py -v
