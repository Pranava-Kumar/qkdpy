name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  UV_SYSTEM_PYTHON: true

jobs:
  # Quality gate: run all CI checks before publishing
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint check (pre-commit)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (mypy)
        run: uv run mypy src/qkdpy

      - name: Run tests
        run: uv run pytest -x --tb=short

  release:
    needs: [quality-gate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true
